<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="100%" height="100%" fill="#1e1e2e"/>
  
  <!-- Map Cells (Grid) -->
  <g stroke="#333344" stroke-width="2">
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
  </g>

  <!-- Cell Highlights -->
  <rect x="100" y="200" width="100" height="100" fill="#ffffff" opacity="0.05"/>
  <text x="110" y="225" fill="#888899" font-family="monospace" font-size="16">map_x: 1, map_y: 2</text>

  <defs>
    <marker id="arrowDir2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ffcc" />
    </marker>
    <marker id="arrowSide" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#ff00cc" />
    </marker>
  </defs>

  <!-- Ray Vector (dir_x, dir_y) -->
  <line x1="140" y1="260" x2="390" y2="60" stroke="#00ffcc" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowDir2)" />
  
  <!-- step_x, step_y Indicators -->
  <text x="30" y="40" fill="#ffff00" font-family="monospace" font-size="18">ray-&gt;dir_x &gt; 0 ? step_x = 1 : -1</text>
  <text x="30" y="65" fill="#ffff00" font-family="monospace" font-size="18">ray-&gt;dir_y &lt; 0 ? step_y = -1 : 1</text>

  <!-- Side Distances -->
  <line x1="140" y1="260" x2="200" y2="212" stroke="#ff00cc" stroke-width="3" marker-end="url(#arrowSide)" />
  <text x="110" y="220" fill="#ff00cc" font-family="monospace" font-size="16" transform="rotate(-38, 110, 220)">side_dist_x</text>

  <line x1="140" y1="260" x2="215" y2="200" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrowSide)" />
  <text x="190" y="250" fill="#ffaa00" font-family="monospace" font-size="16">side_dist_y</text>

  <!-- Delta Distances -->
  <polygon points="215,200 340,100 215,100" fill="none" stroke="#00ffcc" stroke-width="2" />
  <text x="270" y="130" fill="#00ffcc" font-family="monospace" font-size="14" transform="rotate(-38, 270, 130)">delta_dist_y</text>
  <text x="260" y="95" fill="#ffffff" font-family="monospace" font-size="12">dy = 1 unit</text>

  <polygon points="200,212 300,132 300,212" fill="none" stroke="#ff00cc" stroke-width="2" />
  <text x="240" y="170" fill="#ff00cc" font-family="monospace" font-size="14" transform="rotate(-38, 240, 170)">delta_dist_x</text>
  <text x="235" y="225" fill="#ffffff" font-family="monospace" font-size="12">dx = 1 unit</text>

  <!-- Player Dot -->
  <circle cx="140" cy="260" r="6" fill="#ffffff" />
  <text x="140" y="290" fill="#ffffff" font-family="monospace" font-size="18">pos (140, 260)</text>
</svg>