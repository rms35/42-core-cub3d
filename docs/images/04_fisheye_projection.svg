<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="100%" height="100%" fill="#1e1e2e"/>

  <!-- Divider -->
  <line x1="400" y1="0" x2="400" y2="600" stroke="#333344" stroke-width="4" />
  
  <!-- LEFT SIDE: Fisheye Correction -->
  <text x="50" y="40" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold">Fisheye Correction</text>
  
  <line x1="200" y1="500" x2="200" y2="200" stroke="#00ffcc" stroke-width="2" />
  <text x="215" y="350" fill="#00ffcc" font-family="monospace" font-size="14">dir</text>

  <!-- Camera Plane -->
  <line x1="100" y1="500" x2="300" y2="500" stroke="#ff00cc" stroke-width="2" />
  <text x="230" y="520" fill="#ff00cc" font-family="monospace" font-size="14">camera plane</text>

  <!-- Wall -->
  <line x1="50" y1="150" x2="350" y2="150" stroke="#ff4444" stroke-width="6" />
  <text x="180" y="140" fill="#ff4444" font-family="monospace" font-size="16">Wall</text>

  <!-- Player -->
  <circle cx="200" cy="500" r="6" fill="#ffffff" />
  
  <!-- Rays -->
  <line x1="200" y1="500" x2="200" y2="150" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="4,4" />
  
  <line x1="200" y1="500" x2="320" y2="150" stroke="#ffff00" stroke-width="2" />
  <text x="270" y="300" fill="#ffff00" font-family="monospace" font-size="14" transform="rotate(-71, 270, 300)">Euclidean Dist</text>

  <line x1="200" y1="500" x2="200" y2="150" stroke="#ffaa00" stroke-width="4" />
  <text x="170" y="250" fill="#ffaa00" font-family="monospace" font-size="14" transform="rotate(-90, 170, 250)">perp_wall_dist</text>

  <line x1="320" y1="150" x2="200" y2="150" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="2,2" />


  <!-- RIGHT SIDE: Screen Projection -->
  <text x="450" y="40" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold">Screen Projection</text>

  <!-- Screen boundaries -->
  <rect x="550" y="100" width="50" height="400" fill="#000000" stroke="#555566" stroke-width="2" />
  <text x="560" y="90" fill="#888899" font-family="monospace" font-size="14">y=0</text>
  <text x="540" y="520" fill="#888899" font-family="monospace" font-size="14">y=HEIGHT</text>

  <!-- Wall Slice -->
  <rect x="550" y="200" width="50" height="200" fill="#ff4444" />
  
  <line x1="530" y1="200" x2="550" y2="200" stroke="#ffffff" stroke-width="2" />
  <text x="430" y="205" fill="#ffffff" font-family="monospace" font-size="16">draw_start</text>

  <line x1="530" y1="400" x2="550" y2="400" stroke="#ffffff" stroke-width="2" />
  <text x="450" y="405" fill="#ffffff" font-family="monospace" font-size="16">draw_end</text>

  <!-- line_height dimension -->
  <line x1="620" y1="200" x2="620" y2="400" stroke="#ffaa00" stroke-width="2" />
  <line x1="615" y1="200" x2="625" y2="200" stroke="#ffaa00" stroke-width="2" />
  <line x1="615" y1="400" x2="625" y2="400" stroke="#ffaa00" stroke-width="2" />
  <text x="630" y="305" fill="#ffaa00" font-family="monospace" font-size="16">line_height</text>
  
  <!-- Formula -->
  <text x="430" y="560" fill="#aaffaa" font-family="monospace" font-size="14">line_height = (int)(HEIGHT / perp_wall_dist)</text>

</svg>